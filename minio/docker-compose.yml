services:

  minio:
    image: quay.io/minio/minio
    container_name: minio
    hostname: minio
    ports:
      - "9000:9000/tcp"
    environment:
      MINIO_ROOT_USER: ${ADMIN_USER}
      MINIO_ROOT_PASSWORD: ${ADMIN_PASSWORD}
    volumes:
      - ./data:/data
    command: server /data --console-address ":9001"
    restart: always
    networks:
      - proxy

networks:
  proxy:
    name: proxy
    external: true
