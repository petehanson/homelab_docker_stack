name: llm

networks:
  proxy:
    external: true

services:
  ollama:
    image: ollama/ollama:rocm
    runtime: runc
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - /mnt/hddpool/models/ollama:/root/.ollama
    environment:
      - NVIDIA_VISIBLE_DEVICES=void
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - "989"   # render — replace with actual GID from: getent group render
      - "985"   # video  — replace with actual GID from: getent group video
    networks:
      - proxy
