name: project-nomad

networks:
  proxy:
    external: true
  nomad_internal:
    driver: bridge

services:

  admin:
    image: ghcr.io/crosstalk-solutions/project-nomad:latest
    pull_policy: always
    container_name: nomad_admin
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /opt/project-nomad/storage:/app/storage
      - /tmp/nomad-disk-info.json:/app/storage/nomad-disk-info.json
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/docker/project-nomad/install/entrypoint.sh:/usr/local/bin/entrypoint.sh
      - /opt/docker/project-nomad/install/wait-for-it.sh:/usr/local/bin/wait-for-it.sh
      - nomad-update-shared:/app/update-shared
    environment:
      - NODE_ENV=production
      - PORT=8080
      - LOG_LEVEL=info
      - APP_KEY=${NOMAD_APP_KEY}
      - HOST=0.0.0.0
      - URL=${NOMAD_URL}
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=nomad
      - DB_USER=nomad_user
      - DB_PASSWORD=${NOMAD_DB_PASSWORD}
      - DB_NAME=nomad
      - DB_SSL=false
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    entrypoint: ["/usr/local/bin/entrypoint.sh"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - proxy
      - nomad_internal

  dozzle:
    image: amir20/dozzle:v10.0
    container_name: nomad_dozzle
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DOZZLE_ENABLE_ACTIONS=true
      - DOZZLE_ENABLE_SHELL=true
    networks:
      - proxy
      - nomad_internal

  mysql:
    image: mysql:8.0
    container_name: nomad_mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${NOMAD_MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=nomad
      - MYSQL_USER=nomad_user
      - MYSQL_PASSWORD=${NOMAD_DB_PASSWORD}
    volumes:
      - /opt/project-nomad/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - nomad_internal

  redis:
    image: redis:7-alpine
    container_name: nomad_redis
    restart: unless-stopped
    volumes:
      - /opt/project-nomad/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - nomad_internal

  updater:
    build:
      context: /opt/docker/project-nomad/install/sidecar-updater
      dockerfile: Dockerfile
    container_name: nomad_updater
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/project-nomad:/opt/project-nomad
      - nomad-update-shared:/shared
    networks:
      - nomad_internal

volumes:
  nomad-update-shared:
    driver: local
