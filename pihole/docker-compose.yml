services:

  unbound:
    image: mvance/unbound:latest
    container_name: pihole_unbound
    restart: unless-stopped
    volumes:
      - ./unbound.conf:/opt/unbound/etc/unbound/unbound.conf:ro
    networks:
      - pihole_internal

  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    ports:
      - "53:53/tcp"
      - "53:53/udp"
    environment:
      TZ: 'America/Chicago'
      PIHOLE_DNS_: unbound#5335
      WEBPASSWORD: ${ADMIN_PASSWORD}
    shm_size: '256m'
    dns:
      - 127.0.0.1
    volumes:
      - ./etc-pihole:/etc/pihole
      - ./etc-dnsmasq.d:/etc/dnsmasq.d
    depends_on:
      - unbound
    restart: unless-stopped
    networks:
      - proxy
      - pihole_internal

networks:
  proxy:
    name: proxy
    external: true
  pihole_internal:
    driver: bridge
    internal: true
